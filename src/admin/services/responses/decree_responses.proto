syntax = "proto3";

package abraxas.voting.ecollecting.admin.services.v1.responses;

import "admin/services/models/decree.proto";
import "shared/enums/collection_state.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Admin.Services.V1.Responses";

message ListDecreesResponse {
  repeated admin.services.v1.models.Decree decrees = 1;
}

message CreateDecreeResponse {
  string id = 1;
  admin.services.v1.models.DecreeUserPermissions user_permissions = 2;
  shared.v1.enums.CollectionPeriodState period_state = 3;
}
