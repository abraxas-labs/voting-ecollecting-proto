syntax = "proto3";

package abraxas.voting.ecollecting.admin.services.v1.responses;

import "admin/services/models/initiative.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Admin.Services.V1.Responses";

message ListInitiativeSubTypesResponse {
  repeated admin.services.v1.models.InitiativeSubType sub_types = 1;
}

message ListInitiativesResponse {
  repeated admin.services.v1.models.InitiativeGroup groups = 1;
}

message VerifyInitiativeCommitteeMemberResponse {
  string last_name = 1;
  string first_name = 2;
  google.protobuf.Timestamp date_of_birth = 3;
  string street = 4;
  string house_number = 5;
  string zip_code = 6;
  string locality = 7;
  bool has_voting_right = 8;
}

message ListAdmissibilityDecisionsResponse {
  repeated admin.services.v1.models.Initiative initiatives = 1;
}

message ListEligibleForAdmissibilityDecisionResponse {
  repeated admin.services.v1.models.Initiative initiatives = 1;
}
