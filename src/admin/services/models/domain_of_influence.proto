syntax = "proto3";

package abraxas.voting.ecollecting.admin.services.v1.models;

import "shared/enums/domain_of_influence.proto";
import "shared/models/file.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Admin.Services.V1.Models";

message DomainOfInfluence {
  string bfs = 1;
  string name = 2;
  string name_for_protocol = 3;
  shared.v1.enums.DomainOfInfluenceType type = 4;
  DomainOfInfluenceSettings settings = 5;
  DomainOfInfluenceAddress address = 6;
  string phone = 7;
  string email = 8;
  repeated string notification_emails = 9;
  string webpage = 10;
  shared.v1.models.File logo = 11;
  bool e_collecting_enabled = 12;
  DomainOfInfluenceUserPermissions user_permissions = 13;
}

message DomainOfInfluenceSettings {
  optional int32 initiative_min_signature_count = 1;
  optional int32 initiative_max_electronic_signature_percent = 2;
  optional int32 initiative_number_of_members_committee = 3;
  optional int32 referendum_min_signature_count = 4;
  optional int32 referendum_max_electronic_signature_percent = 5;
}

message DomainOfInfluenceAddress {
  string name = 1;
  string street = 2;
  string zip_code = 3;
  string locality = 4;
}

message DomainOfInfluenceUserPermissions {
  bool can_edit = 1;
}
