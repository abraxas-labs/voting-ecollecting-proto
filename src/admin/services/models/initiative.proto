syntax = "proto3";

package abraxas.voting.ecollecting.admin.services.v1.models;

import "admin/services/models/collection.proto";
import "google/protobuf/timestamp.proto";
import "shared/enums/collection_permission_role.proto";
import "shared/enums/collection_state.proto";
import "shared/enums/domain_of_influence.proto";
import "shared/enums/initiative_committee_member_approval_state.proto";
import "shared/enums/initiative_committee_member_signature_type.proto";
import "shared/models/date.proto";
import "shared/models/file.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Admin.Services.V1.Models";

message InitiativeGroup {
  shared.v1.enums.DomainOfInfluenceType domain_of_influence_type = 1;
  repeated Initiative initiatives = 2;
}

message Initiative {
  string id = 1;
  shared.v1.enums.DomainOfInfluenceType domain_of_influence_type = 2;
  string bfs = 3;
  int32 min_signature_count = 4;
  int32 max_electronic_signature_count = 5;
  string wording = 6;
  admin.services.v1.models.Collection collection = 7;
  InitiativeSubType sub_type = 8;
  string government_decision_number = 9;
  AdmissibilityDecisionState admissibility_decision_state = 10;
  admin.services.v1.models.InitiativeLockedFields locked_fields = 11;
  shared.v1.models.Date sensitive_data_expiry_date = 12;
  string domain_of_influence_name = 13;
}

message InitiativeSubType {
  string id = 1;
  string bfs = 2;
  shared.v1.enums.DomainOfInfluenceType domain_of_influence_type = 3;
  string description = 4;
  int32 min_signature_count = 5;
  int32 max_electronic_signature_count = 6;
}

message InitiativeCommittee {
  repeated shared.v1.models.File committee_lists = 1;
  repeated InitiativeCommitteeMember active_committee_members = 2;
  repeated InitiativeCommitteeMember rejected_or_expired_committee_members = 3;
  bool approved_members_count_ok = 4;
  int32 approved_members_count = 5;
  int32 total_members_count = 6;
  int32 required_approved_members_count = 7;
}

message InitiativeCommitteeMember {
  string id = 1;
  string first_name = 2;
  string political_first_name = 3;
  string last_name = 4;
  string political_last_name = 5;
  google.protobuf.Timestamp date_of_birth = 6;
  string bfs = 7;
  string residence = 8;
  string political_residence = 9;
  string street = 10;
  string house_number = 11;
  string zip_code = 12;
  string email = 13;
  string political_duty = 14;
  bool member_signature_requested = 15;
  shared.v1.enums.InitiativeCommitteeMemberApprovalState approval_state = 16;
  shared.v1.enums.InitiativeCommitteeMemberSignatureType signature_type = 17;
  shared.v1.enums.CollectionPermissionRole role = 18;
  InitiativeCommitteeMemberUserPermissions user_permissions = 19;
}

enum AdmissibilityDecisionState {
  ADMISSIBILITY_DECISION_STATE_UNSPECIFIED = 0;
  ADMISSIBILITY_DECISION_STATE_OPEN = 1;
  ADMISSIBILITY_DECISION_STATE_VALID_BUT_SUBJECT_TO_CONDITIONS = 2;
  ADMISSIBILITY_DECISION_STATE_VALID = 3;
  ADMISSIBILITY_DECISION_STATE_REJECTED = 4;
}

message InitiativeLockedFields {
  bool wording = 1;
  bool description = 2;
  bool committee_members = 3;
}

message InitiativeCommitteeMemberUserPermissions {
  bool can_reset = 1;
  bool can_verify = 2;
}
