syntax = "proto3";

package abraxas.voting.ecollecting.admin.services.v1.models;

import "admin/services/models/person.proto";
import "google/protobuf/timestamp.proto";
import "shared/models/date.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Admin.Services.V1.Models";

message CollectionSignatureSheet {
  string id = 1;
  int32 number = 2;
  shared.v1.models.Date received_at = 3;
  google.protobuf.Timestamp attested_at = 4;
  string created_by_name = 5;
  string modified_by_name = 6;
  CollectionSignatureSheetCount count = 7;
  CollectionSignatureSheetState state = 8;
  string municipality_name = 9;
  string bfs = 10;
  CollectionSignatureSheetUserPermissions user_permissions = 11;
  bool modified_by_superior_authority = 12;
}

message CollectionSignatureSheetCount {
  int32 total = 1;
  int32 valid = 2;
  int32 invalid = 3;
}

enum CollectionSignatureSheetState {
  COLLECTION_SIGNATURE_SHEET_STATE_UNSPECIFIED = 0;
  COLLECTION_SIGNATURE_SHEET_STATE_CREATED = 1;
  COLLECTION_SIGNATURE_SHEET_STATE_ATTESTED = 2;
  COLLECTION_SIGNATURE_SHEET_STATE_NOT_SUBMITTED = 3;
  COLLECTION_SIGNATURE_SHEET_STATE_SUBMITTED = 4;
  COLLECTION_SIGNATURE_SHEET_STATE_CONFIRMED = 5;
}

message CollectionSignatureSheetUserPermissions {
  bool can_edit = 1;
  bool can_delete = 2;
  bool can_submit = 3;
  bool can_unsubmit = 4;
  bool can_discard = 5;
  bool can_restore = 6;
  bool can_confirm = 7;
}

message CollectionSignatureSheetCandidate {
  Person person = 1;
  CollectionSignatureSheetCandidateExistingSignature existing_signature = 2;
}

message CollectionSignatureSheetCandidateExistingSignature {
  string bfs = 1;
  string municipality_name = 2;
  bool electronic = 3;
  string collection_description = 4;
  optional int32 signature_sheet_number = 5;
  google.protobuf.Timestamp collection_date_time = 6;
  bool is_in_same_municipality = 7;
  bool is_on_same_sheet = 8;
}
