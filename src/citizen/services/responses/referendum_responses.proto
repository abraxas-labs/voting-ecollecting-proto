syntax = "proto3";

package abraxas.voting.ecollecting.citizen.services.v1.responses;

import "citizen/services/models/decree.proto";
import "citizen/services/models/referendum.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Citizen.Services.V1.Responses";

message ListMyReferendumsResponse {
  repeated citizen.services.v1.models.Decree decrees = 1;
  repeated citizen.services.v1.models.Referendum without_decree_referendums = 2;
}

message ListDecreesEligibleForReferendumResponse {
  repeated citizen.services.v1.models.DecreeGroup groups = 1;
}
