syntax = "proto3";

package abraxas.voting.ecollecting.citizen.services.v1.responses;

import "citizen/services/models/collection_permission.proto";
import "citizen/services/models/collections_group.proto";
import "shared/enums/collection_permission_role.proto";
import "shared/enums/collection_type.proto";
import "shared/models/collection_message.proto";
import "shared/models/file.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Citizen.Services.V1.Responses";

message ListCollectionsResponse {
  repeated citizen.services.v1.models.CollectionsGroup groups = 1;
}

message ListCollectionPermissionsResponse {
  repeated citizen.services.v1.models.CollectionPermission permissions = 1;
}

// expose as little data as necessary via the permission token
// to accept the permission and access more data
// an agov identity with a matching email is required.
message GetPendingCollectionPermissionResponse {
  string collection_id = 1;
  shared.v1.enums.CollectionType collection_type = 2;
  string collection_description = 3;
  string invited_by_name = 4;
  string last_name = 5;
  string first_name = 6;
  shared.v1.enums.CollectionPermissionRole role = 7;

  // the accepted ACRs to accept this permission.
  repeated string accept_accepted_acrs = 8;
}

message ListCollectionMessagesResponse {
  repeated shared.v1.models.CollectionMessage messages = 1;
  bool informal_review_requested = 2;
}

message SetSignatureSheetTemplateGeneratedResponse {
  shared.v1.models.File generated_signature_sheet_template = 1;
}

message GenerateSignatureSheetTemplatePreviewResponse {
  shared.v1.models.File generated_signature_sheet_template = 1;
}
