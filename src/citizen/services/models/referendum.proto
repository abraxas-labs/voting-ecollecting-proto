syntax = "proto3";

package abraxas.voting.ecollecting.citizen.services.v1.models;

import "citizen/services/models/collection.proto";
import "shared/enums/collection_came_not_about_reason.proto";
import "shared/enums/collection_state.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Citizen.Services.V1.Models";

message Referendum {
  string id = 1;
  SimpleDecree decree = 2;
  string members_committee = 3;
  citizen.services.v1.models.Collection collection = 4;

  // whether another collection of the same decree as this collection
  // is signed by the current user.
  // Can only be true if collection.is_signed is false.
  optional bool is_other_referendum_of_same_decree_signed = 6;
}

message SimpleDecree {
  string id = 1;
  string description = 2;
  shared.v1.enums.CollectionPeriodState period_state = 3;
  int32 max_electronic_signature_count = 4;
  shared.v1.enums.CollectionCameNotAboutReason came_not_about_reason = 5;
}
