syntax = "proto3";

package abraxas.voting.ecollecting.citizen.services.v1.models;

option csharp_namespace = "Voting.ECollecting.Proto.Citizen.Services.V1.Models";

message CollectionCount {
  string id = 1;
  string collection_id = 2;

  // this field is only filled if the collection in an 'ended' state
  optional int32 total_citizen_count = 3;

  int32 electronic_citizen_count = 4;
}
