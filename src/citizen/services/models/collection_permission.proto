syntax = "proto3";

package abraxas.voting.ecollecting.citizen.services.v1.models;

import "shared/enums/collection_permission_role.proto";
import "shared/enums/collection_permission_state.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Citizen.Services.V1.Models";

message CollectionPermission {
  string id = 1;
  string collection_id = 2;
  string last_name = 3;
  string first_name = 4;
  string email = 5;
  shared.v1.enums.CollectionPermissionState state = 6;
  shared.v1.enums.CollectionPermissionRole role = 7;
  string iam_last_name = 8;
  string iam_first_name = 9;
  string iam_user_id = 10;
}
