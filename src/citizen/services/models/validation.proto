syntax = "proto3";

package abraxas.voting.ecollecting.citizen.services.v1.models;

import "shared/enums/validation.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Citizen.Services.V1.Models";

message ValidationSummary {
  repeated ValidationResult validation_results = 1;
  bool is_valid = 2;
}

message ValidationResult {
  shared.v1.enums.Validation validation = 1;
  bool is_valid = 2;
}
