syntax = "proto3";

package abraxas.voting.ecollecting.citizen.services.v1.requests;

import "citizen/services/models/collection.proto";
import "google/protobuf/timestamp.proto";
import "rules/rules.proto";
import "shared/enums/collection_permission_role.proto";
import "shared/enums/domain_of_influence.proto";

option csharp_namespace = "Voting.ECollecting.Proto.Citizen.Services.V1.Requests";

message ListMyInitiativesRequest {
}

message ListInitiativeSubTypesRequest {
}

message CreateInitiativeRequest {
  shared.v1.enums.DomainOfInfluenceType domain_of_influence_type = 1 [(validation.v1.rules).enum.exact_enum = true];
  string bfs = 2 [(validation.v1.rules).string = { max_length: 8, alpha_num_white: true, allow_empty: true }];
  string sub_type_id = 3 [(validation.v1.rules).string = { guid: true, allow_empty: true }];
  string description = 4 [(validation.v1.rules).string = { min_length: 1, max_length: 200, complex_sl_text: true }];
}

message SetInitiativeInPreparationRequest {
  string secure_id_number = 1 [(validation.v1.rules).string = { min_length: 12, max_length: 12, regex: "^[A-Z0-9]{12}$" }];
}

message GetInitiativeRequest {
  string id = 1 [(validation.v1.rules).string.guid = true];
  bool include_committee_description = 2;
  bool include_is_signed = 3;
}

message UpdateInitiativeRequest {
  string id = 1 [(validation.v1.rules).string.guid = true];
  string sub_type_id = 2 [(validation.v1.rules).string = { guid: true, allow_empty: true }];
  string description = 3 [(validation.v1.rules).string = { min_length: 1, max_length: 200, complex_sl_text: true }];
  string wording = 4 [(validation.v1.rules).string = { min_length: 1, max_length: 10000, complex_ml_text: true }];
  string reason = 5 [(validation.v1.rules).string = { max_length: 10000, complex_ml_text: true, allow_empty: true }];
  citizen.services.v1.models.CollectionAddress address = 6 [(validation.v1.rules).object.required = true];
  string link = 7 [(validation.v1.rules).string = { max_length: 2000, https_url: true, allow_empty: true }];
}

message SubmitInitiativeRequest {
  string id = 1 [(validation.v1.rules).string.guid = true];
}

message FlagInitiativeForReviewRequest {
  string id = 1 [(validation.v1.rules).string.guid = true];
}

message RegisterInitiativeRequest {
  string id = 1 [(validation.v1.rules).string.guid = true];
}

message GetInitiativeCommitteeRequest {
  string id = 1 [(validation.v1.rules).string.guid = true];
}

message DeleteCommitteeListRequest {
  string initiative_id = 1 [(validation.v1.rules).string.guid = true];
  string id = 2 [(validation.v1.rules).string.guid = true];
}

message AddCommitteeMemberRequest {
  string initiative_id = 1 [(validation.v1.rules).string.guid = true];
  string first_name = 2 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string political_first_name = 3 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string last_name = 4 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string political_last_name = 5 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  google.protobuf.Timestamp date_of_birth = 6 [(validation.v1.rules).object.required = true];
  string bfs = 7 [(validation.v1.rules).string = { min_length: 1, max_length: 8, alpha_num_white: true }];
  string political_residence = 8 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string street = 9 [(validation.v1.rules).string = { min_length: 1, max_length: 150, complex_sl_text: true }];
  string house_number = 10 [(validation.v1.rules).string = { min_length: 1, max_length: 30, alpha_num_white: true }];
  string zip_code = 11 [(validation.v1.rules).string = { min_length: 1, max_length: 15, complex_sl_text: true }];
  string email = 12 [(validation.v1.rules).string = { email: true, allow_empty: true } ];
  string political_duty = 13 [(validation.v1.rules).string = { max_length: 50, complex_sl_text: true, allow_empty: true }];
  shared.v1.enums.CollectionPermissionRole role = 14 [(validation.v1.rules).enum = { exact_enum: true, allow_unspecified: true }];
  bool request_member_signature = 15;
}

message DeleteCommitteeMemberRequest {
  string initiative_id = 1 [(validation.v1.rules).string.guid = true];
  string id = 2 [(validation.v1.rules).string.guid = true];
}

message UpdateCommitteeMemberSortRequest {
  string initiative_id = 1 [(validation.v1.rules).string.guid = true];
  string id = 2 [(validation.v1.rules).string.guid = true];
  int32 new_index = 3 [(validation.v1.rules).integer.min_value = 0];
}

message ResendCommitteeMemberInvitationRequest {
  string initiative_id = 1 [(validation.v1.rules).string.guid = true];
  string id = 2 [(validation.v1.rules).string.guid = true];
}

message UpdateCommitteeMemberRequest {
  string initiative_id = 1 [(validation.v1.rules).string.guid = true];
  string id = 2 [(validation.v1.rules).string.guid = true];
  string first_name = 3 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string political_first_name = 4 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string last_name = 5 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string political_last_name = 6 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  google.protobuf.Timestamp date_of_birth = 7 [(validation.v1.rules).object.required = true];
  string bfs = 8 [(validation.v1.rules).string = { min_length: 1, max_length: 8, alpha_num_white: true }];
  string political_residence = 9 [(validation.v1.rules).string = { min_length: 1, max_length: 100, complex_sl_text: true }];
  string street = 10 [(validation.v1.rules).string = { min_length: 1, max_length: 150, complex_sl_text: true }];
  string house_number = 11 [(validation.v1.rules).string = { min_length: 1, max_length: 30, alpha_num_white: true }];
  string zip_code = 12 [(validation.v1.rules).string = { min_length: 1, max_length: 15, complex_sl_text: true }];
  string email = 13 [(validation.v1.rules).string = { email: true, allow_empty: true } ];
  string political_duty = 14 [(validation.v1.rules).string = { max_length: 50, complex_sl_text: true, allow_empty: true }];
  shared.v1.enums.CollectionPermissionRole role = 15 [(validation.v1.rules).enum = { exact_enum: true, allow_unspecified: true }];
  bool request_member_signature = 16;
}

message UpdateCommitteeMemberPoliticalDutyRequest {
  string initiative_id = 1 [(validation.v1.rules).string.guid = true];
  string id = 2 [(validation.v1.rules).string.guid = true];
  string political_duty = 3 [(validation.v1.rules).string = { max_length: 50, complex_sl_text: true, allow_empty: true }];
}

message GetPendingCommitteeMembershipByTokenRequest {
  string token = 1 [(validation.v1.rules).string.regex = "^ut\\.1-[A-Za-z0-9\\-_]+$"];
}

message AcceptCommitteeMembershipRequest {
  string token = 1 [(validation.v1.rules).string.regex = "^ut\\.1-[A-Za-z0-9\\-_]+$"];
}

message RejectCommitteeMembershipRequest {
  string token = 1 [(validation.v1.rules).string.regex = "^ut\\.1-[A-Za-z0-9\\-_]+$"];
}

message SignInitiativeRequest {
  string id = 1 [(validation.v1.rules).string.guid = true];
}
